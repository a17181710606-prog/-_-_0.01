# nginx 反向代理：HTTP → HTTPS 重定向 + 反代 Next.js
# certbot 会在申请证书时自动追加 HTTPS server 块，无需手动添加
server {
    listen 80;
    listen [::]:80;
    server_name wonderfulfilm.com www.wonderfulfilm.com;

    # certbot 域名验证用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余流量强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wonderfulfilm.com www.wonderfulfilm.com;

    # certbot 申请后会自动填写以下两行，首次部署前先注释掉
    # ssl_certificate     /etc/letsencrypt/live/wonderfulfilm.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/wonderfulfilm.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
